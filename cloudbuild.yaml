steps:
  # ── 1. Build da imagem Docker ──────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - --tag
      - 'gcr.io/$PROJECT_ID/licita-radar:$COMMIT_SHA'
      - --tag
      - 'gcr.io/$PROJECT_ID/licita-radar:latest'
      - --cache-from
      - 'gcr.io/$PROJECT_ID/licita-radar:latest'
      - .

  # ── 2. Push para o Container Registry ────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - '--all-tags'
      - 'gcr.io/$PROJECT_ID/licita-radar'

  # ── 3. Deploy no Cloud Run ────────────────────────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - licita-radar
      - --image=gcr.io/$PROJECT_ID/licita-radar:$COMMIT_SHA
      - --region=southamerica-east1
      - --platform=managed
      - --allow-unauthenticated
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --port=8080
      - --set-env-vars=ENVIRONMENT=production

images:
  - 'gcr.io/$PROJECT_ID/licita-radar:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/licita-radar:latest'

options:
  logging: CLOUD_LOGGING_ONLY
